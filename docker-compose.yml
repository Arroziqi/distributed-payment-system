services:
  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-service
    environment:
      SERVICE_NAME: auth-service
      HTTP_PORT: "8080"
      POSTGRES_DSN: postgres://postgres:postgres@postgres-auth:5432/auth_db?sslmode=disable
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
    ports:
      - "8081:8080"
    depends_on:
      - postgres-auth
      - redis
      - rabbitmq

  wallet-service:
    build:
      context: ./services/wallet-service
    container_name: wallet-service
    environment:
      SERVICE_NAME: wallet-service
      HTTP_PORT: "8080"
      POSTGRES_DSN: postgres://postgres:postgres@postgres-wallet:5432/wallet_db?sslmode=disable
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8082:8080"
    depends_on:
      - postgres-wallet
      - redis
      - rabbitmq

  transaction-service:
    build:
      context: ./services/transaction-service
    container_name: transaction-service
    environment:
      SERVICE_NAME: transaction-service
      HTTP_PORT: "8080"
      POSTGRES_DSN: postgres://postgres:postgres@postgres-transaction:5432/transaction_db?sslmode=disable
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8083:8080"
    depends_on:
      - postgres-transaction
      - redis
      - rabbitmq

  notification-service:
    build:
      context: ./services/notification-service
    container_name: notification-service
    environment:
      SERVICE_NAME: notification-service
      HTTP_PORT: "8080"
      POSTGRES_DSN: postgres://postgres:postgres@postgres-notification:5432/notification_db?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8084:8080"
    depends_on:
      - postgres-notification
      - rabbitmq

  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - ./services/auth-service/migrations:/docker-entrypoint-initdb.d

  postgres-wallet:
    image: postgres:16-alpine
    container_name: postgres-wallet
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wallet_db
    ports:
      - "5434:5432"
    volumes:
      - ./services/wallet-service/migrations:/docker-entrypoint-initdb.d

  postgres-transaction:
    image: postgres:16-alpine
    container_name: postgres-transaction
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transaction_db
    ports:
      - "5435:5432"
    volumes:
      - ./services/transaction-service/migrations:/docker-entrypoint-initdb.d

  postgres-notification:
    image: postgres:16-alpine
    container_name: postgres-notification
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_db
    ports:
      - "5436:5432"
    volumes:
      - ./services/notification-service/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6378:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - auth-service
      - wallet-service
      - transaction-service
      - notification-service

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
